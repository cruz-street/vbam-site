<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Vero Beach Adult Medicine">
  <g transform="translate(10 32)">
    <!-- Seven rays -->
    <g stroke="#0A3D4A" stroke-width="1.1" stroke-linecap="round" fill="none">
      <line x1="50" y1="19.5" x2="50" y2="13" />
      <line x1="56.18" y1="20.7" x2="58.62" y2="14.67" />
      <line x1="43.82" y1="20.7" x2="41.38" y2="14.67" />
      <line x1="61.46" y1="24.13" x2="65.98" y2="19.46" />
      <line x1="38.54" y1="24.13" x2="34.02" y2="19.46" />
      <line x1="65.07" y1="29.29" x2="71.01" y2="26.64" />
      <line x1="34.93" y1="29.29" x2="28.99" y2="26.64" />
    </g>
    <!-- Sun -->
    <path d="M37 36 A 13 13 0 0 1 63 36 Z" fill="#F49B2C" />
    <!-- Upper wave (navy) — cradles the sun with a slight dip beneath the base -->
    <path d="M8 37 Q 25 34.5 37 37 Q 50 39.2 63 37 Q 78 39 92 37"
          fill="none" stroke="#0A3D4A" stroke-width="1.6" stroke-linecap="round" />
    <!-- Lower wave (sea glass) -->
    <path d="M14 46 Q 32 43 50 46 T 86 46"
          fill="none" stroke="#5FB3C0" stroke-width="1.45" stroke-linecap="round" />
  </g>
</svg>
