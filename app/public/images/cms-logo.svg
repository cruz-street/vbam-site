<svg width="200" height="140" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">

  <!-- Hexagon mark -->
  <polygon points="100,6 124,20 124,48 100,62 76,48 76,20" fill="#0B2A38"/>
  <!-- Code brackets inside hex -->
  <text x="88" y="42" font-family="'Courier New',monospace" font-size="14" font-weight="700" fill="#1491ED" text-anchor="middle">&lt;/&gt;</text>
  <text x="112" y="42" font-family="'Courier New',monospace" font-size="14" font-weight="700" fill="#0784BF" text-anchor="middle"></text>

  <!-- CF inside hex -->
  <text x="100" y="43" font-family="'Courier New',monospace" font-size="20" font-weight="900" fill="white" text-anchor="middle">CF</text>

  <!-- CodeFoundry wordmark -->
  <text x="100" y="84" font-size="15" font-weight="700" fill="#0B2A38" text-anchor="middle" letter-spacing="2">CODEFOUNDRY</text>

  <!-- Divider -->
  <line x1="50" y1="97" x2="150" y2="97" stroke="#E0E0E0" stroke-width="1"/>

  <!-- powered by label -->
  <text x="100" y="114" font-size="9" fill="#999" text-anchor="middle" letter-spacing="1">POWERED BY</text>

  <!-- Cruz Street CS badge -->
  <rect x="84" y="120" width="16" height="16" rx="3" fill="#0784BF"/>
  <text x="92" y="132" font-size="9" font-weight="700" fill="white" text-anchor="middle">CS</text>

  <!-- Cruz Street name -->
  <text x="106" y="132" font-size="11" font-weight="600" fill="#0784BF" text-anchor="start">Cruz Street</text>

</svg>
