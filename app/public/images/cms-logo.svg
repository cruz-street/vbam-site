<svg width="240" height="155" viewBox="0 0 240 155" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">

  <!-- ── CodeFoundry section ── -->

  <!-- Hex badge -->
  <polygon points="60,6 82,19 82,45 60,58 38,45 38,19" fill="#0B2A38"/>
  <text x="60" y="39" font-family="'Courier New',monospace" font-size="19" font-weight="900" fill="white" text-anchor="middle">CF</text>

  <!-- Wordmark -->
  <text x="96" y="30" font-size="11" font-weight="700" fill="#0B2A38" letter-spacing="2">CODE</text>
  <text x="96" y="48" font-size="11" font-weight="700" fill="#0784BF" letter-spacing="2">FOUNDRY</text>

  <!-- Divider -->
  <line x1="20" y1="72" x2="220" y2="72" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ── Powered by label ── -->
  <text x="120" y="89" font-size="8" fill="#AAAAAA" text-anchor="middle" letter-spacing="2">POWERED BY</text>

  <!-- ── Cruz Street logo ── -->

  <!-- Diamond pinwheel icon, centered horizontally with text -->
  <!-- Diamond corners: T(72,105) R(90,123) B(72,141) L(54,123) C(72,123) -->
  <!-- Top-left quadrant: light gray -->
  <polygon points="72,105 54,123 72,123" fill="#A8A8A8"/>
  <!-- Top-right quadrant: lighter gray -->
  <polygon points="72,105 90,123 72,123" fill="#C0C0C0"/>
  <!-- Bottom-right quadrant: steel blue -->
  <polygon points="90,123 72,141 72,123" fill="#5BA4CD"/>
  <!-- Bottom-left quadrant: medium blue -->
  <polygon points="72,141 54,123 72,123" fill="#3B82B0"/>

  <!-- CruzStreet text -->
  <text x="98" y="119" font-size="14" font-weight="700" fill="#3B82B0">CruzStreet</text>
  <text x="98" y="135" font-size="9" fill="#888888">Data Science on Demand</text>

</svg>
